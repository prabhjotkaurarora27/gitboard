<!DOCTYPE html>
<html>
<head>
  <title>GitBoard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 40%;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #334155;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>🚀 GitBoard Dashboard</h1>

  <div class="container">
    
    <div class="card">
      <h2>📌 Commits</h2>
      <ul id="commits"></ul>
    </div>

    <div class="card">
      <h2>🏆 Leaderboard</h2>
      <ul id="leaderboard"></ul>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
